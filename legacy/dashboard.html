<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舆情监控仪表板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #888; margin-top: 10px; }
        
        .overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stock-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
            border-color: rgba(0, 210, 255, 0.3);
        }
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .stock-name { font-size: 1.3em; font-weight: bold; }
        .stock-code { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 3px 10px; 
            border-radius: 15px; 
            font-size: 0.85em;
            color: #aaa;
        }
        .sentiment-badge {
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .positive { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .negative { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .neutral { background: linear-gradient(135deg, #667eea, #764ba2); }
        
        .stats-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-val { font-size: 1.2em; font-weight: bold; color: #00d2ff; }
        .stat-label { font-size: 0.75em; color: #888; }
        
        .hot-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }
        .hot-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffc107, #ff9800);
            border-radius: 3px;
            transition: width 0.5s;
        }
        
        .detail-section {
            display: none;
            margin-top: 30px;
        }
        .detail-section.active { display: block; }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 15px;
        }
        .item-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        .item-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 210, 255, 0.3);
        }
        .item-title {
            font-size: 1em;
            margin-bottom: 8px;
            line-height: 1.5;
            word-break: break-word;
        }
        .item-title a {
            color: #00d2ff;
            text-decoration: none;
            padding: 2px 6px;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 4px;
            transition: all 0.3s;
        }
        .item-title a:hover {
            background: rgba(0, 210, 255, 0.3);
            text-decoration: none;
        }
        .item-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85em;
            color: #888;
            margin-top: 8px;
        }
        .item-source { 
            color: #4caf50; 
            font-weight: 500;
        }
        .item-sentiment {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            margin-left: 10px;
        }
        .pos { background: rgba(0, 176, 155, 0.3); color: #00b09b; }
        .neg { background: rgba(255, 107, 107, 0.3); color: #ff6b6b; }
        .neu { background: rgba(102, 126, 234, 0.3); color: #667eea; }
        
        .section-title {
            font-size: 1.2em;
            margin: 20px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab:hover, .tab.active {
            background: rgba(0, 210, 255, 0.2);
            border-color: #00d2ff;
            color: #fff;
        }
        .empty-msg {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>舆情监控仪表板</h1>
            <p>点击股票卡片查看详情</p>
        </div>
        
        <!-- Overview Grid -->
        <div class="overview" id="overview"></div>
        
        <!-- Detail Section -->
        <div class="detail-section" id="detail">
            <div class="detail-header">
                <button class="back-btn" onclick="showOverview()">← 返回概览</button>
                <h2 id="detail-title"></h2>
            </div>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('news')">新闻</button>
                <button class="tab" onclick="switchTab('reports')">研报</button>
                <button class="tab" onclick="switchTab('announcements')">公告</button>
                <button class="tab" onclick="switchTab('discussions')">讨论 💬</button>
            </div>
            
            <div class="items-grid" id="items-list"></div>
        </div>
    </div>

    <script>
        let currentData = null;
        let currentStock = null;
        let currentTab = 'news';
        const API_URL = '/api/data';

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('Invalid response');
                }
                currentData = await response.json();
                renderOverview();
            } catch (e) {
                console.error(e);
                document.getElementById('overview').innerHTML = 
                    '<p class="empty-msg">加载失败，请确保服务器已启动</p>';
            }
        }

        function renderOverview() {
            const grid = document.getElementById('overview');
            if (!currentData?.stocks) {
                grid.innerHTML = '<p class="empty-msg">暂无数据</p>';
                return;
            }
            
                grid.innerHTML = '';
                for (const [symbol, stock] of Object.entries(currentData.stocks)) {
                    const c = stock.sentiment_score > 0.1 ? 'positive' : 
                              stock.sentiment_score < -0.1 ? 'negative' : 'neutral';
                    const hotPercent = Math.min(100, stock.hot_score / 10);
                    const discCount = stock.statistics.discussion_count || 0;
                    
                    grid.innerHTML += `
                        <div class="stock-card" onclick="showDetail('${symbol}')">
                            <div class="stock-header">
                                <span class="stock-name">${stock.name}</span>
                                <span class="stock-code">${stock.symbol}</span>
                            </div>
                            <div class="sentiment-badge ${c}">${stock.sentiment_label} (${stock.sentiment_score > 0 ? '+' : ''}${stock.sentiment_score.toFixed(3)})</div>
                            <div class="stats-row">
                                <div class="stat"><div class="stat-val">${stock.statistics.news_count}</div><div class="stat-label">新闻</div></div>
                                <div class="stat"><div class="stat-val">${stock.statistics.report_count}</div><div class="stat-label">研报</div></div>
                                <div class="stat"><div class="stat-val">${stock.statistics.announcement_count}</div><div class="stat-label">公告</div></div>
                                <div class="stat"><div class="stat-val">${discCount}</div><div class="stat-label">讨论</div></div>
                            </div>
                            <div class="hot-bar">
                                <div class="hot-fill" style="width: ${hotPercent}%"></div>
                            </div>
                        </div>`;
                }
            }

        function showDetail(symbol) {
            currentStock = currentData.stocks[symbol];
            document.getElementById('overview').style.display = 'none';
            document.getElementById('detail').classList.add('active');
            document.getElementById('detail-title').textContent = `${currentStock.name} (${currentStock.symbol})`;
            switchTab('news');
        }

        function showOverview() {
            document.getElementById('overview').style.display = 'grid';
            document.getElementById('detail').classList.remove('active');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const list = document.getElementById('items-list');
            if (!currentStock) return;
            
            const items = currentStock[tab] || [];
            if (items.length === 0) {
                list.innerHTML = '<p class="empty-msg">暂无数据</p>';
                return;
            }
            
            list.innerHTML = '';
            for (const item of items.slice(0, 50)) {
                let title = item.title || '';
                if (!title || title.trim() === '') {
                    title = item.content ? item.content.substring(0, 80) + '...' : '无标题';
                }
                
                const url = item.url;
                const hasUrl = url && url.startsWith('http');
                
                // Source icon mapping
                const sourceIcons = {
                    '东方财富': '📰',
                    '东方财富股吧': '💬',
                    '微博热搜': '🔥',
                    '微博搜索': '🔍',
                    '雪球': '🎯',
                    '雪球话题': '🏷️',
                    '同花顺股吧': '💬',
                    '东方财富研报': '📊',
                    '新浪财经': '📈',
                    '巨潮资讯': '📋',
                    '系统': '⚙️'
                };
                
                const icon = sourceIcons[item.source] || '📄';
                
                list.innerHTML += `
                    <div class="item-card">
                        <div class="item-title">
                            ${icon} 
                            ${hasUrl ? `<a href="${url}" target="_blank">${title}</a>` : title}
                        </div>
                        <div class="item-meta">
                            <span class="item-source">${item.source || ''}</span>
                            <span>${item.pub_date || ''}</span>
                            ${item.org ? `<span>${item.org}</span>` : ''}
                            ${item.rating ? `<span style="color:#ffc107;">★ ${item.rating}</span>` : ''}
                        </div>
                    </div>`;
            }
        }

        loadData();
        setInterval(loadData, 120000);
    </script>
</body>
</html>
